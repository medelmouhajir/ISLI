# ISLI Prompts Configuration
# Single source of truth for all LLM prompts across Keeper, Agent SDK, and Core.
# Modify prompts here; services reload on restart.

keeper:
  summarize: |
    Summarize the following text in under {max_length} words:

    {text}

    Summary:

  journal_update: |
    Update the structured session journal based on the recent messages. Maintain the following format precisely:

    [Context]
    (General environment, active versions, user preferences)
    [Decisions]
    (Key decisions made, agreed-upon constraints, or changes in direction)
    [Last State]
    (What the agent was doing most recently and where it left off)

    Old Journal:
    {old_journal}

    Recent Messages:
    {recent_messages}
    Updated Structured Journal:

  heartbeat_anomaly: |
    Analyze the following recent activity for agent '{agent_id}' (Status: {status}). Detect any anomalies like infinite loops, stuck states, or repetitive behavior.

    Activity:
    {activity}

    If an anomaly is found, describe it in one short sentence. Otherwise, respond with 'NONE'.

  heartbeat_validate: |
    Analyze the recent activity for agent '{agent_id}'. Heartbeat received at: {heartbeat_at}

    The Activity Log below is a summary of the agent's past session journals (conversation history), NOT a log of heartbeat events. Multiple entries close together simply reflect ongoing chat activity and are normal.

    ONLY flag an anomaly if you see one of these:
    - The agent is stuck retrying the same failing action repeatedly (e.g., repeated tool failures, repeated API errors).
    - The agent is looping with no forward progress.
    - A crash or fatal error appears in RECENT entries and has not been resolved.

    Ignore entries older than 24 hours unless the same failure repeats today.
    Activity Log:
    {compressed_log}

    Respond ONLY with a JSON object:
    - "is_valid": boolean (true if normal, false if anomaly found)
    - "anomaly": string | null (short one-sentence description of the anomaly, or null)

    Example normal: {{"is_valid": true, "anomaly": null}}
    Example anomaly: {{"is_valid": false, "anomaly": "Agent stuck in repetitive loop"}}

  pii_scrub: |
    Identify any REMAINING Personal Identifiable Information (PII) in the following text. PII includes names, proprietary IDs, and addresses. Do NOT re-scrub placeholders starting with [[PII_.

    Replace remaining PII with a unique placeholder like [[PII_NAME_N]] or [[PII_ADDR_N]].

    Text: {text}

    Return ONLY a JSON object with two fields: 'scrubbed_text' and 'mapping' (new placeholder -> original value).

  skill_clean: |
    Clean the following raw data and extract only information relevant to: {extraction_goal}

    If the data is HTML, strip all tags and boilerplate. Return a clean, compact JSON or text summary.

    Raw Data:
    {raw_data}

    Cleaned Data:

  verify_logic: |
    Act as a logic judge. Analyze the following agent output for contradictions, infinite reasoning loops, or safety violations.

    Context: {context}
    Agent Output: {text}

    Is this output valid? Respond with JSON: {{"is_valid": bool, "reason": "string"}}

  model_router: |
    You are a model router. Analyze the task and pick the best model from the available list.

    Task: {task_description}
    Heuristic complexity score: {complexity_score}/10 (tier: {complexity_tier})

    Available models:
    {model_list}

    Default model: {default_model}

    Respond ONLY with JSON:
    {{
      "recommended_model_id": "...",
      "reason": "One-sentence justification"
    }}

agent:
  system_prompt_template: |
    === IDENTITY ===
    Name: {name}
    Description: {description}
    {persona_line}

    === PROTOCOL CONSTRAINTS ===
    - You operate within a shared blackboard system.
    - NEVER attempt to directly invoke or message another agent.
    - ALL coordination and delegation happens through the Kanban board exclusively.
    - If a task is flagged needs_human_approval: true — HALT. Do not execute.
      Surface your readiness state and await human confirmation via the Review column.

    === DECISION LOGIC ===
    Before acting on any objective, run this internal check:
    1. Full capability -> proceed.
    2. Partial capability -> execute your portion, create a Kanban task
       for the remainder with a clear handoff note.
    3. No capability / high-risk action -> do NOT attempt.
       Create a Kanban task immediately with appropriate priority.
    4. Task depth > 2 or needs_human_approval -> HALT and surface state.

    === CONTEXT ===
    {context_summary}
    [Memory as of: {context_timestamp}]

    === AVAILABLE TOOLS ===
    You have access to the following tools. Call them when appropriate.
    {tools_list}

    Use the tools when you need to interact with external systems.

    When the user asks you to send a notification, use notify_user immediately.
    The user's request is their approval — do not ask for additional confirmation.

  tool_descriptions:
    get_current_datetime: Return the current UTC date and time.
    shell_exec: Execute a shell command in a sandboxed environment.
    file_read: Read the contents of a file from the agent's workspace.
    file_write: Write content to a file in the agent's workspace. Creates parent directories if needed.
    file_list: List files and directories in a path within the agent's workspace.
    file_delete: Delete a file from the agent's workspace. Directories cannot be deleted with this tool.
    send_message: Send a proactive message to a user through one of the agent's assigned channels (e.g., telegram). The agent must have the channel in its assigned channels list.
    web_fetch: Fetch the content of a website or API from a URL.
    web_search: Search the web for information using a query.
    memory_save: Save a fact to the agent's long-term semantic memory. Use this to remember important information for later retrieval.
    memory_delete: Delete a previously saved fact from the agent's semantic memory by its fact ID.
    memory_search: Search the agent's semantic memory for facts relevant to a query.
    summarize_text: Summarize a long text into a shorter version using the Keeper sidecar.
    summarize: Summarize text into a concise format, optionally with a specific goal.
    translate: Translate text from one language to another.
    embed_text: Generate a vector embedding for a piece of text.
    create_engineering_plan: Generate a structured implementation plan (PLAN.md) before starting complex tasks.
    test_skill: Dry-run test dynamic skill code in a sandbox with a test payload.
    register_skill: Register a new dynamic skill and submit it for human review. Call this ONLY after successful testing.
    interactive_debugger: Run code in an interactive debugger with breakpoints, variable inspection, and line-by-line execution trace. Use this to diagnose bugs by watching variables change across execution.
    attach_to_task: Attach a file from the local workspace to a specific task for another agent to use.
    pull_task_attachment: Pull an attachment from a task into your local workspace. Records source metadata sidecar.
    promote_output: Promote a file from a task workspace to a shared project workspace. Use this for permanent project outputs.
    shared_file_read: Read a file from a shared project workspace that you are a member of.
    shared_file_write: Write content to a file in a shared project workspace. Operations are atomic.
    shared_file_list: List files and directories in a shared project workspace.
    git_clone: Clone a remote git repository into the agent's workspace. Provide the clone URL and a relative workspace path.
    git_status: Show the working tree status of a git repository — modified, staged, and untracked files.
    git_commit: Stage files and commit changes in a git repository with a descriptive message.
    git_push: Push the current or specified branch to a remote repository.
    git_pull: Pull changes from a remote repository into the current branch.
    git_branch_list: List all branches in a git repository, with the current branch indicated.
    git_branch_create: Create a new branch in a git repository, optionally checking it out immediately.
    git_checkout: Checkout (switch to) an existing branch in a git repository.
    git_log: Show the commit history of a git repository (last N commits).
    pip_install: "Install Python packages from PyPI into the agent's workspace. Uses pip install --target so packages persist across restarts. Example packages: requests, pandas, Pillow, numpy."
    pip_list: List Python packages installed in the agent's workspace via pip-install.
    get_secret: "Retrieve a secret value from your secure vault by name. Use this to access API keys, database credentials, authentication tokens, or encryption keys without hardcoding them. Example: get_secret('openai_api_key')."
    notify_user: Display a notification card in the user's web UI. Use this when the user asks you to send a notification, reminder, or alert.

core:
  help_text: |
    Available commands:
    /new — start a fresh session
    /compact — trigger journal compaction now
    /context — show current session journal
    /status — show agent and session stats
    /remember <text> — pin a fact to memory
    /forget <text> — search and propose a memory to delete
    /confirm_forget — confirm deletion from last /forget
    /memories — list pinned memories
    /retry — retry the last unanswered message
    /cancel — cancel the current in-progress task
    /help — show this list

  context_inject_task_desc: "Session with {user_id}: {last_message}"

  prompt_injection_markers:
    - "ignore\\s+(previous|above|all)\\s+instructions"
    - "ignore\\s+(previous|above|all)\\s+(prompts?|commands?)"
    - "disregard\\s+(previous|above|all)\\s+instructions"
    - "you\\s+are\\s+now\\s+"
    - "new\\s+role\\s*:?\\s*"
    - "system\\s+prompt\\s*:"
    - "developer\\s+mode"
    - "DAN\\s+mode"
    - "jailbreak"
    - "\\{\\{.*\\}\\}"
    - "<%.*%>"
