services:
  traefik:
    image: traefik:v2.11
    command:
    - --api.dashboard=false
    - --providers.docker=true
    - --providers.docker.exposedbydefault=false
    - --entrypoints.web.address=:80
    - --entrypoints.websecure.address=:443
    - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL:-admin@example.com}
    - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    - --accesslog=true
    - --accesslog.format=json
    - --log.level=INFO
    ports:
    - 80:80
    - 443:443
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - letsencrypt:/letsencrypt
    networks:
    - isli-public
    - isli-mesh
    restart: unless-stopped
    environment:
      SKILLS_URL: http://skills:8100
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isli}
      POSTGRES_USER: ${POSTGRES_USER:-isli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      SKILLS_URL: http://skills:8100
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-isli}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - isli-data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - isli-data
    restart: unless-stopped
    environment:
      SKILLS_URL: http://skills:8100
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_KEEP_ALIVE: '-1'
      OLLAMA_NUM_THREADS: ${OLLAMA_NUM_THREADS:-8}
      SKILLS_URL: http://skills:8100
    volumes:
    - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - ollama list >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
    - isli-data
    - isli-mesh
    restart: unless-stopped
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
    - /bin/sh
    - -c
    command: "\"ollama pull qwen3:1.7b &&\n ollama pull qwen3:4b &&\n ollama pull\
      \ mistral:7b &&\n ollama pull qwen2.5-coder:1.5b &&\n ollama pull nomic-embed-text\
      \ &&\n ollama pull mxbai-embed-large ||\n exit 1\"\n"
    environment:
      OLLAMA_HOST: ollama:11434
      SKILLS_URL: http://skills:8100
    networks:
    - isli-data
    - isli-mesh
    restart: 'no'
  audio:
    image: ${AUDIO_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-audio:latest}
    build:
      context: ./isli-audio
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      AUDIO_STT_MODEL: ${AUDIO_STT_MODEL:-whisper-tiny}
      AUDIO_TTS_MODEL: ${AUDIO_TTS_MODEL:-piper-en-us-lessac-medium}
      AUDIO_LANGUAGE: ${AUDIO_LANGUAGE:-en}
      JWT_SECRET: /run/secrets/jwt_secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SKILLS_URL: http://skills:8100
    volumes:
    - audio_models:/app/models
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8400/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
    - isli-mesh
    - isli-data
    restart: unless-stopped
    secrets:
    - jwt_secret
  core:
    image: ${CORE_API_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-core:latest}
    build:
      context: ./isli-core
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isli}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: /run/secrets/jwt_secret
      PII_ENCRYPTION_KEY: /run/secrets/pii_encryption_key
      ADMIN_API_KEY: /run/secrets/admin_api_key
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      KEEPER_URL: http://keeper:8001
      WORKSPACE_URL: http://workspace:8300
      CHANNELS_URL: http://channels:8200
      AUDIO_URL: http://audio:8400
      CORE_API_URL: http://core:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      ANONYMIZED_TELEMETRY: 'FALSE'
      AGENT_SDK_PATH: /opt/isli/isli-agent-sdk
      AGENT_NETWORK: ${COMPOSE_PROJECT_NAME:-isli}_isli-mesh
      SKILL_NETWORK: ${COMPOSE_PROJECT_NAME:-isli}_isli-mesh
      AGENT_RUNNER_IMAGE: ${AGENT_RUNNER_IMAGE:-isli-agent-runner:latest}
      WORKSPACE_BASE_PATH: /workspaces
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
      PII_MESH_DEFAULT_ENABLED: ${PII_MESH_DEFAULT_ENABLED:-false}
      PII_USE_SLM_DEFAULT: ${PII_USE_SLM_DEFAULT:-false}
      PII_REGEX_PRE_FILTER: ${PII_REGEX_PRE_FILTER:-true}
      PII_TOKEN_TTL_HOURS: ${PII_TOKEN_TTL_HOURS:-24}
      SKILLS_URL: http://skills:8100
    volumes:
    - chroma_data:/data/vectors
    - installed_skills_data:/data/installed_skills
    - ./isli-core/src/isli_core:/app/src/isli_core
    - ./prompts.yaml:/app/prompts.yaml
    - ./isli-agent-sdk:/opt/isli/isli-agent-sdk:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - workspace_data:/workspaces
    secrets:
    - jwt_secret
    - admin_api_key
    - pii_encryption_key
    networks:
    - isli-mesh
    - isli-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keeper:
        condition: service_healthy
      audio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    restart: unless-stopped
  keeper:
    image: ${KEEPER_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-keeper:latest}
    build:
      context: ./isli-keeper
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_GEN_MODEL: ${OLLAMA_GEN_MODEL:-qwen2.5-coder:1.5b}
      DATABASE_URL: postgresql://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isli}
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: /run/secrets/jwt_secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SKILLS_URL: http://skills:8100
    volumes:
    - ./prompts.yaml:/app/prompts.yaml
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
    - isli-mesh
    - isli-data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    secrets:
    - jwt_secret
  channels:
    image: ${CHANNELS_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-channels:latest}
    build:
      context: ./isli-channels
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis:6379/2
      CORE_API_URL: http://core:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      WHATSAPP_SIDECAR_URL: http://whatsapp-sidecar:3001
      AUDIO_URL: http://audio:8400
      JWT_SECRET: /run/secrets/jwt_secret
      SIDECAR_WEBHOOK_SECRET: ${SIDECAR_WEBHOOK_SECRET}
      SIDECAR_API_TOKEN: ${SIDECAR_API_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SKILLS_URL: http://skills:8100
    labels:
    - traefik.enable=true
    - traefik.http.routers.channels.rule=Host(`${ISLI_DOMAIN}`) && PathPrefix(`/webhook`)
    - traefik.http.routers.channels.entrypoints=websecure
    - traefik.http.routers.channels.tls.certresolver=letsencrypt
    - traefik.http.routers.channels-http.rule=Host(`${ISLI_DOMAIN}`) && PathPrefix(`/webhook`)
    - traefik.http.routers.channels-http.entrypoints=web
    - traefik.http.routers.channels-http.middlewares=redirect-to-https
    - traefik.http.services.channels.loadbalancer.server.port=8200
    secrets:
    - jwt_secret
    networks:
    - isli-mesh
    - isli-data
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
      whatsapp-sidecar:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8200/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  whatsapp-sidecar:
    build:
      context: ./isli-whatsapp-sidecar
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      CHANNELS_WEBHOOK_URL: http://channels:8200/webhook/whatsapp
      AUTH_BASE_DIR: /auth/whatsapp
      SIDECAR_WEBHOOK_SECRET: ${SIDECAR_WEBHOOK_SECRET}
      SIDECAR_API_TOKEN: ${SIDECAR_API_TOKEN}
      SKILLS_URL: http://skills:8100
    volumes:
    - whatsapp_auth:/auth/whatsapp
    networks:
    - isli-mesh
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3001/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  skills:
    image: ${SKILLS_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-skills:latest}
    build:
      context: ./isli-skills
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis:6379/3
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isli}
      CORE_API_URL: http://core:8000
      KEEPER_URL: http://keeper:8001
      WORKSPACE_URL: http://workspace:8300
      SEARXNG_URL: http://searxng:8080/search
      SKILL_REGISTRY_TOKEN: ${SKILL_REGISTRY_TOKEN}
      JWT_SECRET: /run/secrets/jwt_secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      BROWSER_REDIS_URL: redis://redis:6379/5
      BROWSER_SESSION_TTL: 600
      BROWSER_HEADLESS: 'true'
      BROWSER_SESSION_DIR: /data/browser-sessions
      BROWSER_MAX_CONCURRENT_SESSIONS: 5
      SKILLS_URL: http://skills:8100
    secrets:
    - jwt_secret
    networks:
    - isli-mesh
    - isli-data
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - workspace_data:/workspaces
    - browser-sessions:/data/browser-sessions
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8100/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  workspace:
    image: ${WORKSPACE_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-workspace:latest}
    build:
      context: ./isli-workspace
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      WORKSPACE_BASE_PATH: /workspaces
      REDIS_URL: redis://redis:6379/4
      JWT_SECRET: /run/secrets/jwt_secret
      SKILLS_URL: http://skills:8100
    volumes:
    - workspace_data:/workspaces
    - ./isli-workspace/src/isli_workspace:/app/isli_workspace
    secrets:
    - jwt_secret
    networks:
    - isli-mesh
    - isli-data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8300/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  agent-runner:
    image: isli-agent-runner:latest
    build:
      context: ./isli-agent-sdk
      dockerfile: Dockerfile
    command:
    - 'true'
    environment:
      CORE_API_URL: http://core:8000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      AGENT_ID: ${AGENT_ID}
      REDIS_URL: redis://redis:6379/0
      KEEPER_URL: http://keeper:8001
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      MODEL_ID: ${MODEL_ID:-qwen2.5:7b}
      OLLAMA_API_BASE: https://ollama.com
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      SKILLS_URL: http://skills:8100
    volumes:
    - ./prompts.yaml:/app/prompts.yaml
    networks:
    - isli-mesh
    depends_on:
      core:
        condition: service_healthy
    deploy:
      replicas: 0
    restart: unless-stopped
  board:
    image: ${BOARD_IMAGE:-${DOCKER_REGISTRY:-ghcr.io/medelmouhajir}/isli-board:latest}
    build:
      context: ./isli-board
      dockerfile: Dockerfile
    labels:
    - traefik.enable=true
    - traefik.http.routers.board.rule=Host(`${ISLI_DOMAIN}`)
    - traefik.http.routers.board.entrypoints=websecure
    - traefik.http.routers.board.tls.certresolver=letsencrypt
    - traefik.http.routers.board-http.rule=Host(`${ISLI_DOMAIN}`)
    - traefik.http.routers.board-http.entrypoints=web
    - traefik.http.routers.board-http.middlewares=redirect-to-https
    - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
    - traefik.http.services.board.loadbalancer.server.port=80
    networks:
    - isli-public
    - isli-mesh
    depends_on:
      core:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    environment:
      SKILLS_URL: http://skills:8100
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      SKILLS_URL: http://skills:8100
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
    - isli-mesh
    - isli-data
    restart: unless-stopped
  searxng:
    image: searxng/searxng:latest
    volumes:
    - ./infra/searxng/settings.yml:/etc/searxng/settings.yml
    networks:
    - isli-mesh
    restart: unless-stopped
    environment:
      SKILLS_URL: http://skills:8100
secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  admin_api_key:
    file: ./secrets/admin_api_key.txt
  pii_encryption_key:
    file: ./secrets/pii_encryption_key.txt
volumes:
  postgres_data: null
  redis_data: null
  ollama_data: null
  workspace_data: null
  letsencrypt: null
  chroma_data: null
  whatsapp_auth: null
  audio_models: null
  browser-sessions: null
  installed_skills_data: null
networks:
  isli-public:
    driver: bridge
  isli-mesh:
    driver: bridge
  isli-data:
    driver: bridge
    internal: true
