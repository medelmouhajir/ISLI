# ISLI — Single-Node Docker Compose (Production)
# Simplest deployment: one host, direct ports, no replicas.
# Copy .env.production to .env and fill in values, then run:
#   docker compose up -d

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isli}
      POSTGRES_USER: ${POSTGRES_USER:-isli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - isli
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isli}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - isli
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  core:
    image: ${CORE_API_IMAGE:-ghcr.io/medelmouhajir/isli-core:latest}
    environment:
      ISLI_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isli}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?error}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?error}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  keeper:
    image: ${KEEPER_IMAGE:-ghcr.io/medelmouhajir/isli-keeper:latest}
    environment:
      ISLI_ENV: production
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_GEN_MODEL: qwen2.5:7b
      DATABASE_URL: postgresql://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-isli}
      REDIS_URL: redis://redis:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8001:8001"
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  channels:
    image: ${CHANNELS_IMAGE:-ghcr.io/medelmouhajir/isli-channels:latest}
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis:6379/2
      CORE_API_URL: http://core:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8002:8200"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  skills:
    image: ${SKILLS_IMAGE:-ghcr.io/medelmouhajir/isli-skills:latest}
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis:6379/3
      CORE_API_URL: http://core:8000
      KEEPER_URL: http://keeper:8001
      WORKSPACE_URL: http://workspace:8300
      SKILL_REGISTRY_TOKEN: ${SKILL_REGISTRY_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8003:8100"
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_started
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  workspace:
    image: ${WORKSPACE_IMAGE:-ghcr.io/medelmouhajir/isli-workspace:latest}
    environment:
      ISLI_ENV: production
      WORKSPACE_BASE_PATH: /workspaces
      REDIS_URL: redis://redis:6379/4
    volumes:
      - workspace_data:/workspaces
    ports:
      - "8300:8300"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  board:
    image: ${BOARD_IMAGE:-ghcr.io/medelmouhajir/isli-board:latest}
    ports:
      - "80:80"
    depends_on:
      - core
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - isli
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  workspace_data:

networks:
  isli:
    driver: bridge
