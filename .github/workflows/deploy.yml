name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [isli-core, isli-keeper, isli-channels, isli-skills, isli-board]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tarball
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }}
          docker save ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}:${{ github.sha }} | gzip > ${{ matrix.service }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-image
          path: ${{ matrix.service }}.tar.gz

  package-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Download all image artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release/images
          pattern: "*-image"

      - name: Organize artifacts
        run: |
          mkdir -p isli-release
          cp docker-compose.yml isli-release/
          cp docker-compose.scale-out.yml isli-release/
          cp .env.production isli-release/.env
          cp -r docs/runbooks isli-release/
          cp scripts/install.sh isli-release/ 2>/dev/null || true
          cp scripts/run-local.sh isli-release/ 2>/dev/null || true
          mv ./release/images/*/* isli-release/
          tar -czf isli-release-${{ github.sha }}.tar.gz isli-release/

      - uses: actions/upload-artifact@v4
        with:
          name: isli-release
          path: isli-release-${{ github.sha }}.tar.gz

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: isli-release-${{ github.sha }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
