name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
    - name: Lint with ruff
      run: ruff check .
    - name: Test with pytest (core)
      run: |
        cd isli-core
        pip install -r requirements.txt
        pytest

  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Build Core Image
      run: docker build -t isli-core:latest isli-core/
    - name: Build Keeper Image
      run: docker build -t isli-keeper:latest isli-keeper/
    - name: Build Skills Image
      run: docker build -t isli-skills:latest isli-skills/
    - name: Build Workspace Image
      run: docker build -t isli-workspace:latest isli-workspace/
    - name: Build Channels Image
      run: docker build -t isli-channels:latest isli-channels/
