name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check src
      - run: ruff format --check src
      - run: mypy src

  test-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-core
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: isli
          POSTGRES_USER: isli
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./isli-core/coverage.xml

  test-keeper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-keeper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./isli-keeper/coverage.xml

  test-channels:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-channels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./isli-channels/coverage.xml

  test-skills:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-skills
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./isli-skills/coverage.xml

  lint-board:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-board
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./isli-board/package.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  build-board:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./isli-board
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./isli-board/package.json
      - run: npm ci
      - run: npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-core, test-core, test-keeper, test-channels, test-skills, lint-board, build-board]
    strategy:
      matrix:
        service: [isli-core, isli-keeper, isli-skills, isli-channels, isli-board]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest

  integration-test:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: isli
          POSTGRES_USER: isli
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core and start API
        working-directory: ./isli-core
        run: |
          pip install -e ".[dev]"
          export DATABASE_URL="postgresql+asyncpg://isli:password@localhost:5432/isli"
          export REDIS_URL="redis://localhost:6379/0"
          export JWT_SECRET="ci-test-secret-thirty-two-bytes-long!!"
          export PII_ENCRYPTION_KEY="ci-test-encryption-key-32bytes!!"
          uvicorn isli_core.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl -sf http://127.0.0.1:8000/health || exit 1
      - name: Install keeper and start API
        working-directory: ./isli-keeper
        run: |
          pip install -e ".[dev]"
          uvicorn isli_keeper.main:app --host 127.0.0.1 --port 8001 &
          sleep 3
          curl -sf http://127.0.0.1:8001/health || exit 1
      - name: Install channels and start API
        working-directory: ./isli-channels
        run: |
          pip install -e ".[dev]"
          uvicorn isli_channels.main:app --host 127.0.0.1 --port 8002 &
          sleep 3
          curl -sf http://127.0.0.1:8002/health || exit 1
      - name: Install skills and start API
        working-directory: ./isli-skills
        run: |
          pip install -e ".[dev]"
          uvicorn isli_skills.main:app --host 127.0.0.1 --port 8003 &
          sleep 3
          curl -sf http://127.0.0.1:8003/health || exit 1
      - name: End-to-end API checks
        run: |
          echo "=== Core API ==="
          curl -sf http://127.0.0.1:8000/health
          curl -sf http://127.0.0.1:8000/ready
          curl -sf http://127.0.0.1:8000/live
          echo "=== Keeper ==="
          curl -sf http://127.0.0.1:8001/health
          curl -sf http://127.0.0.1:8001/ready
          curl -sf http://127.0.0.1:8001/live
          echo "=== Channels ==="
          curl -sf http://127.0.0.1:8002/health
          curl -sf http://127.0.0.1:8002/ready
          curl -sf http://127.0.0.1:8002/live
          echo "=== Skills ==="
          curl -sf http://127.0.0.1:8003/health
          curl -sf http://127.0.0.1:8003/ready
          curl -sf http://127.0.0.1:8003/live
          echo "=== Integration checks passed ==="

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
