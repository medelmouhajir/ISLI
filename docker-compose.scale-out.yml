# ISLI — Scale-Out Docker Compose (Production-like)
# Extends the base setup with Traefik, Redis Sentinel, and all 5 services.

version: "3.9"

services:
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --accesslog=true
      - --accesslog.format=json
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isli}
      POSTGRES_USER: ${POSTGRES_USER:-isli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isli
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isli}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DATABASE: ${POSTGRES_DB:-isli}
      DATABASES_USER: ${POSTGRES_USER:-isli}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_master_data:/data
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-replica:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    volumes:
      - redis_replica_data:/data
    depends_on:
      - redis-master
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-sentinel-1:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-sentinel-2:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis-sentinel-3:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infra/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  isli-core:
    build:
      context: ./isli-core
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-isli}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-isli}
      REDIS_URL: redis://redis-master:6379/0
      JWT_SECRET: ${JWT_SECRET:?error}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:?error}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isli-core.rule=Host(`api.isli.local`) || PathPrefix(`/api`)"
      - "traefik.http.routers.isli-core.entrypoints=web"
      - "traefik.http.services.isli-core.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.isli-core.loadbalancer.healthcheck.interval=10s"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  isli-keeper:
    build:
      context: ./isli-keeper
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      OLLAMA_HOST: ${OLLAMA_HOST:-http://nginx-ollama:80}
      REDIS_URL: redis://redis-master:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isli-keeper.rule=PathPrefix(`/keeper`)"
      - "traefik.http.routers.isli-keeper.entrypoints=web"
      - "traefik.http.services.isli-keeper.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.isli-keeper.loadbalancer.healthcheck.interval=10s"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      - redis-master
      - nginx-ollama
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  isli-channels:
    build:
      context: ./isli-channels
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis-master:6379/2
      CORE_API_URL: http://isli-core:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isli-channels.rule=PathPrefix(`/channels`)"
      - "traefik.http.routers.isli-channels.entrypoints=web"
      - "traefik.http.services.isli-channels.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.isli-channels.loadbalancer.healthcheck.interval=10s"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      - redis-master
      - isli-core
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  isli-skills:
    build:
      context: ./isli-skills
      dockerfile: Dockerfile
    environment:
      ISLI_ENV: production
      REDIS_URL: redis://redis-master:6379/3
      CORE_API_URL: http://isli-core:8000
      SKILL_REGISTRY_TOKEN: ${SKILL_REGISTRY_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isli-skills.rule=PathPrefix(`/skills`)"
      - "traefik.http.routers.isli-skills.entrypoints=web"
      - "traefik.http.services.isli-skills.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.isli-skills.loadbalancer.healthcheck.interval=10s"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      - redis-master
      - isli-core
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  isli-board:
    build:
      context: ./isli-board
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.isli-board.rule=Host(`isli.local`) || PathPrefix(`/`)"
      - "traefik.http.routers.isli-board.entrypoints=web"
      - "traefik.http.services.isli-board.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.isli-board.loadbalancer.healthcheck.interval=10s"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-1:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama-2:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx-ollama:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/ollama.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ollama-1
      - ollama-2
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - isli
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  isli:
    driver: bridge

volumes:
  letsencrypt:
  postgres_data:
  redis_master_data:
  redis_replica_data:
  chroma_data:
  ollama_data:
